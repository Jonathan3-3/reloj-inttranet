{% extends 'base.html' %}
{% block title %}Nueva Incidencia{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Nueva Incidencia</h4>
    <a href="{% url 'lista-incidencias' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Empleado</label>
                        <select name="empleado" class="form-select" required>
                            <option value="">-- Seleccionar --</option>
                            {% for emp in empleados %}
                            <option value="{{ emp.id }}">{{ emp.id_original }} - {{ emp.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo de incidencia</label>
                        <select name="tipo" class="form-select" required>
                            <option value="">-- Seleccionar --</option>
                            {% for t in tipos %}
                            <option value="{{ t.id }}">{{ t.nombre }} ({{ t.codigo }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date" name="fecha" class="form-control" value="{% now 'Y-m-d' %}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Minutos (opcional)</label>
                        <input type="number" name="minutos" class="form-control" value="0" min="0">
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3"></textarea>
            </div>
            <div class="text-end">
                <a href="{% url 'lista-incidencias' %}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Registrar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
