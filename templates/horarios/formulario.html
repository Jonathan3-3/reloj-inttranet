{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-calendar-plus me-2"></i>{{ titulo }}</h4>
    <a href="{% url 'lista-horarios' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <h6 class="text-muted mb-3">Configuración General</h6>
                    <div class="mb-3">
                        <label class="form-label">Nombre del horario</label>
                        <input type="text" name="nombre" class="form-control" value="{{ horario.nombre|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo de asignación</label>
                        <select name="tipo_asignacion" class="form-select" id="tipo-asignacion" onchange="cambiarTipo()">
                            <option value="departamento" {% if horario.tipo_asignacion == 'departamento' %}selected{% endif %}>Por Departamento</option>
                            <option value="area" {% if horario.tipo_asignacion == 'area' %}selected{% endif %}>Por Área</option>
                            <option value="individual" {% if horario.tipo_asignacion == 'individual' %}selected{% endif %}>Individual</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-check-label">
                            <input type="checkbox" name="activo" class="form-check-input" {% if horario.activo or not horario %}checked{% endif %}> Activo
                        </label>
                    </div>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted mb-3">Ventana de Entrada</h6>
                    <div class="mb-3">
                        <label class="form-label">Inicio ventana</label>
                        <input type="time" name="ventana_entrada_inicio" class="form-control" value="{{ horario.ventana_entrada_inicio|time:'H:i'|default:'07:00' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fin ventana</label>
                        <input type="time" name="ventana_entrada_fin" class="form-control" value="{{ horario.ventana_entrada_fin|time:'H:i'|default:'09:00' }}" required>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <label class="form-label">Prórroga (min)</label>
                            <input type="number" name="prorroga_minutos" class="form-control" value="{{ horario.prorroga_minutos|default:'10' }}" min="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Tol. ausencia (min)</label>
                            <input type="number" name="tolerancia_ausencia_minutos" class="form-control" value="{{ horario.tolerancia_ausencia_minutos|default:'60' }}" min="1">
                        </div>
                    </div>
                </div>
            </div>

            <hr>
            <div class="row">
                <div class="col-md-4">
                    <h6 class="text-muted mb-3">Comida</h6>
                    <div class="mb-3">
                        <label class="form-label">Inicio ventana comida</label>
                        <input type="time" name="comida_ventana_inicio" class="form-control" value="{{ horario.comida_ventana_inicio|time:'H:i'|default:'12:00' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fin ventana comida</label>
                        <input type="time" name="comida_ventana_fin" class="form-control" value="{{ horario.comida_ventana_fin|time:'H:i'|default:'16:00' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duración permitida (min)</label>
                        <input type="number" name="comida_duracion_minutos" class="form-control" value="{{ horario.comida_duracion_minutos|default:'60' }}" min="1">
                    </div>
                </div>
                <div class="col-md-4">
                    <h6 class="text-muted mb-3">Jornada</h6>
                    <div class="mb-3">
                        <label class="form-label">Horas de jornada</label>
                        <input type="number" step="0.5" name="jornada_hrs" class="form-control" value="{{ horario.jornada_hrs|default:'8.00' }}" min="1" max="24">
                    </div>
                </div>
                <div class="col-md-4" id="asignacion-container">
                    <h6 class="text-muted mb-3">Asignar a:</h6>
                    <div class="mb-3" id="grupo-areas" style="display:none">
                        <label class="form-label">Areas</label>
                        <select name="areas" class="form-select" multiple size="5">
                            {% for a in areas %}
                            <option value="{{ a.id }}">{{ a.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3" id="grupo-departamentos" style="display:none">
                        <label class="form-label">Departamentos</label>
                        <select name="departamentos" class="form-select" multiple size="5">
                            {% for d in departamentos %}
                            <option value="{{ d.id }}">{{ d.nombre }} ({{ d.area.nombre }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3" id="grupo-empleados" style="display:none">
                        <label class="form-label">Empleados</label>
                        <select name="empleados" class="form-select" multiple size="5">
                            {% for e in empleados %}
                            <option value="{{ e.id }}">{{ e.id_original }} - {{ e.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-end mt-3">
                <a href="{% url 'lista-horarios' %}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function cambiarTipo() {
    var tipo = document.getElementById('tipo-asignacion').value;
    document.getElementById('grupo-areas').style.display = tipo === 'area' ? 'block' : 'none';
    document.getElementById('grupo-departamentos').style.display = tipo === 'departamento' ? 'block' : 'none';
    document.getElementById('grupo-empleados').style.display = tipo === 'individual' ? 'block' : 'none';
}
document.addEventListener('DOMContentLoaded', cambiarTipo);
</script>
{% endblock %}
