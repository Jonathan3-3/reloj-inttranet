{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>{{ titulo }}</h4>
    <a href="{% url 'lista-empleados' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <h6 class="text-muted mb-3">Datos Personales</h6>
                    <div class="mb-3">
                        <label class="form-label">ID Original *</label>
                        <input type="text" name="id_original" class="form-control" value="{{ empleado.id_original|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre completo *</label>
                        <input type="text" name="nombre" class="form-control" value="{{ empleado.nombre|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Departamento</label>
                        <select name="departamento" class="form-select">
                            <option value="">-- Seleccionar --</option>
                            {% for d in departamentos %}
                            <option value="{{ d.id }}" {% if empleado.departamento_id == d.id %}selected{% endif %}>{{ d.nombre }} ({{ d.area.nombre }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Puesto</label>
                        <input type="text" name="puesto" class="form-control" value="{{ empleado.puesto|default:'' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted mb-3">Contacto y Configuración</h6>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ empleado.telefono|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" name="email" class="form-control" value="{{ empleado.email|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de ingreso</label>
                        <input type="date" name="fecha_ingreso" class="form-control" value="{{ empleado.fecha_ingreso|date:'Y-m-d'|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ID en dispositivo (scanner)</label>
                        <input type="text" name="id_en_dispositivo" class="form-control" value="{{ empleado.id_en_dispositivo|default:'' }}">
                    </div>
                </div>
            </div>
            <div class="text-end mt-3">
                <a href="{% url 'lista-empleados' %}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
