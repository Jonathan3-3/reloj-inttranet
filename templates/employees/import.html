{% extends 'base.html' %}
{% block title %}Importar Empleados{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-upload me-2"></i>Importar Empleados desde CSV</div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Archivo CSV</label>
                        <input type="file" name="archivo" class="form-control" accept=".csv" required>
                        <small class="text-muted">El CSV debe tener columnas: id_original, nombre, puesto, telefono, email</small>
                    </div>
                    <div class="text-end">
                        <a href="{% url 'lista-empleados' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-upload me-1"></i>Importar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
