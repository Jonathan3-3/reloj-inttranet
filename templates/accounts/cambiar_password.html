{% extends 'base.html' %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body p-4 text-center">
        <i class="bi bi-shield-lock-fill display-4 text-warning mb-3"></i>
        <h4>Cambiar Contraseña</h4>
        <p class="text-muted">Es necesario que cambies tu contraseña antes de continuar.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3 text-start">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" name="password1" class="form-control" required minlength="6">
          </div>
          <div class="mb-3 text-start">
            <label class="form-label">Confirmar contraseña</label>
            <input type="password" name="password2" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">
            <i class="bi bi-check-circle me-2"></i>Cambiar contraseña
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
