{% extends 'base.html' %}
{% block title %}Asistencia - {{ empleado.nombre }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-clock-history me-2"></i>Asistencia: {{ empleado.id_original }} - {{ empleado.nombre }}</h4>
    <a href="{% url 'detalle-empleado' empleado.id %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Empleado</a>
</div>

<div class="card mb-4">
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-4">
                <input type="date" id="fecha-desde" class="form-control" value="{% now 'Y-m-01' %}">
            </div>
            <div class="col-md-4">
                <input type="date" id="fecha-hasta" class="form-control" value="{% now 'Y-m-d' %}">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="consultar()"><i class="bi bi-search me-1"></i>Consultar</button>
            </div>
            <div class="col-md-2">
                <a href="/attendance/api/reporte/excel/?empleado_pk={{ empleado.id }}" class="btn btn-success w-100"><i class="bi bi-file-earmark-excel me-1"></i>Excel</a>
            </div>
        </div>
    </div>
</div>

<div id="resultados-container"></div>
{% endblock %}

{% block extra_js %}
<script>
function consultar() {
    var desde = document.getElementById('fecha-desde').value;
    var hasta = document.getElementById('fecha-hasta').value;
    var container = document.getElementById('resultados-container');
    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

    fetch('/attendance/api/reporte/?empleado_id={{ empleado.id }}&desde=' + desde + '&hasta=' + hasta)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            var totalHoras = 0, totalRetardos = 0;
            d.resultados.forEach(function(r) { totalHoras += r.horas; totalRetardos += r.retardo; });

            var html = '<div class="row g-2 mb-3">';
            html += '<div class="col-3"><div class="stat-card bg-stat-blue"><div class="stat-number">' + d.total + '</div><div class="stat-label">Días</div></div></div>';
            html += '<div class="col-3"><div class="stat-card bg-stat-green"><div class="stat-number">' + totalHoras.toFixed(1) + '</div><div class="stat-label">Horas</div></div></div>';
            html += '<div class="col-3"><div class="stat-card bg-stat-orange"><div class="stat-number">' + totalRetardos + '</div><div class="stat-label">Min Retardo</div></div></div>';
            html += '<div class="col-3"><div class="stat-card bg-stat-purple"><div class="stat-number">' + (totalHoras / (d.total || 1)).toFixed(1) + '</div><div class="stat-label">Prom. Horas</div></div></div>';
            html += '</div>';

            html += '<div class="card"><div class="card-body p-0"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Fecha</th><th>Entrada</th><th>Comida Inicio</th><th>Comida Fin</th><th>Salida</th><th>Horas</th><th>Retardo</th><th>Incidencia</th></tr></thead><tbody>';
            d.resultados.forEach(function(r) {
                var cls = r.incidencia === 'llt' ? 'table-warning' : r.incidencia === 'finj' ? 'table-danger' : '';
                var badge = r.incidencia === 'llt' ? '<span class="incidencia-badge" style="background:#fff3cd;color:#856404;">🔴 Retardo ' + r.retardo + '\'</span>' : r.incidencia === 'finj' ? '<span class="incidencia-badge" style="background:#f8d7da;color:#721c24;">❌ Ausente</span>' : '<span class="incidencia-badge" style="background:#d4edda;color:#155724;">🟢 OK</span>';
                html += '<tr class="' + cls + '"><td>' + r.fecha + '</td><td>' + r.entrada + '</td><td>' + r.comida_inicio + '</td><td>' + r.comida_fin + '</td><td>' + r.salida + '</td><td>' + r.horas + '</td><td>' + r.retardo + '\'</td><td>' + badge + '</td></tr>';
            });
            html += '</tbody></table></div></div></div>';
            container.innerHTML = html || '<div class="alert alert-info">Sin resultados</div>';
        });
}

document.addEventListener('DOMContentLoaded', consultar);
</script>
{% endblock %}
