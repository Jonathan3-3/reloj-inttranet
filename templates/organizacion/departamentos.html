{% extends 'base.html' %}
{% block title %}Departamentos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>Departamentos</h4>
    <a href="{% url 'nuevo-departamento' %}" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle me-1"></i>Nuevo Departamento</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>Nombre</th><th>Area</th><th></th></tr></thead>
            <tbody>
                {% for d in departamentos %}
                <tr>
                    <td><strong>{{ d.nombre }}</strong></td>
                    <td>{{ d.area.nombre }}</td>
                    <td class="text-end"><a href="{% url 'editar-departamento' d.id %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a></td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center text-muted">Sin departamentos</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
